# Testing Workflow

name: Example

on:
  push:
    branches: [ testing ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Build Project
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx', '!**/node_modules/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env: 
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: next-build
          path: .next
          include-hidden-files: true
          retention-days: 1
  
  unit-test:
    runs-on: ubuntu-latest
    needs: build
    steps :
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      
      - name: Run unit tests
        run: npm run test:unit
        env: 
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    steps :
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      
      - name: Run integration tests
        run: npm run test:integration
        env: 
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
  
  create-pr:
    runs-on: ubuntu-latest
    needs: [integration-test , unit-test]
    if: github.ref == 'refs/heads/testing'
    steps:
      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Test Workflow] Unit and integration tests completed successfully`,
              head: 'testing',
              base: 'release',
              body: [
                'This is an automated pull request created after successful unit and integration tests.',
                '',
                '### Test Details:',
                '- **Unit Tests**: Verified cryptography utilities and database helper functions.',
                '- **Integration Tests**: Verified GET/POST API endpoints, data flow, visitor likes, and compressed/encrypted image storage & decryption.'
              ].join('\n')
            });